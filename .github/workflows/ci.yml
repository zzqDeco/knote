name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Go tests
        run: KNOTE_KAG_FAKE=1 go test ./...

      - name: Python adapter smoke
        run: python -m unittest discover -s adapters/kag -p '*test*.py'

      - name: Build CLI
        run: CGO_ENABLED=0 go build -o bin/knote ./cmd/knote

      - name: Fake MVP acceptance smoke
        env:
          KNOTE_EINO_API_KEY: ${{ secrets.KNOTE_EINO_API_KEY }}
          KNOTE_EINO_BASE_URL: ${{ vars.KNOTE_EINO_BASE_URL }}
          KNOTE_EINO_MODEL: ${{ vars.KNOTE_EINO_MODEL }}
          KNOTE_EINO_REASONING_EFFORT: ${{ vars.KNOTE_EINO_REASONING_EFFORT }}
        run: |
          if [[ -z "${KNOTE_EINO_API_KEY:-}" || -z "${KNOTE_EINO_BASE_URL:-}" || -z "${KNOTE_EINO_MODEL:-}" ]]; then
            echo "Skipping fake MVP acceptance smoke: Eino-only TUI smoke requires KNOTE_EINO_API_KEY, KNOTE_EINO_BASE_URL, and KNOTE_EINO_MODEL."
            exit 0
          fi
          scripts/smoke_fake_mvp.sh
